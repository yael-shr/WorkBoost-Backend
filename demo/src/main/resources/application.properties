# שם האפליקציה
spring.application.name=workboost

# כתובת החיבור ל-SQL Server (משתמש בפורט הסטנדרטי 1433)
# החליפי את workboost בשם ה-Database שפתחת ב-SQL Server Management Studio (SSMS)
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=workboost;encrypt=true;trustServerCertificate=true;

# פרטי ההתחברות שלך למסד הנתונים (משתמש מקומי או משתמש ה-sa שלך)
spring.datasource.username=workboost_user
spring.datasource.password=Password123
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# התאמת הדיאלקט של Hibernate ל-SQL Server
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# עדכון אוטומטי של הטבלאות לפי מחלקות ה-Java שנכתוב
spring.jpa.hibernate.ddl-auto=update

# הצגת שאילתות ה-SQL בטרמינל לצורך מעקב ודיבוג
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true